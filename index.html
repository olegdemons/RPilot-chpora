<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Шпаргалка инспектора — РМРП Арбат</title>
  <script
    src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.0/dist/index.global.js"
    integrity="sha384-nWTzRTCY/9V4Bo352ehygr1c4cnst4XN6lMR3fipakEQrhVpc0hEM5Dii3Amz0sT"
    crossorigin="anonymous"
  ></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
    @theme {
      --color-axion: #ff6a00;
      --color-axion-bright: #ff8c1a;
      --color-axion-deep: #ff3d00;
      --font-display: "Space Grotesk", system-ui, sans-serif;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-dvh bg-[#0a0604] text-gray-100 antialiased">

  <div class="glow-bg" aria-hidden="true">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- STICKY HEADER -->
  <header id="topbar" class="sticky top-0 z-50 backdrop-blur-xl bg-[#0a0604]/85 border-b border-orange-500/15">
    <div class="max-w-[1700px] mx-auto px-3 py-2">
      <div class="flex flex-wrap items-center gap-x-3 gap-y-2 justify-between">
        <div class="flex items-center gap-2">
          <span class="logo-mark"></span>
          <h1 class="font-display font-bold text-sm sm:text-base tracking-tight leading-none">
            Шпаргалка инспектора <span class="text-axion">· РМРП Арбат</span>
          </h1>
        </div>
        <div class="flex items-center gap-2 flex-1 justify-end flex-wrap">
          <div class="relative flex-1 min-w-[160px] max-w-xs">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-orange-400/70 text-sm">🔍</span>
            <input id="search" type="text" placeholder="Поиск статьи…"
              class="w-full pl-9 pr-3 py-1.5 rounded-lg bg-orange-500/8 border border-orange-500/25 text-sm placeholder:text-gray-500 focus:outline-none focus:border-axion-bright focus:bg-orange-500/12 transition">
          </div>
          <div id="modes" class="flex items-center gap-1 bg-orange-500/8 border border-orange-500/20 rounded-lg p-0.5">
            <button data-mode="list" class="mode-btn active">📜 Список</button>
            <button data-mode="rect" class="mode-btn">🖥️ Широкий</button>
            <button data-mode="square" class="mode-btn">🔲 Квадрат</button>
          </div>
        </div>
      </div>
      <!-- LEGEND -->
      <div class="mt-1.5 flex flex-wrap items-center gap-x-4 gap-y-1 text-[10.5px] text-gray-400">
        <span class="flex items-center gap-1"><span class="lg-fine">30к</span> штраф</span>
        <span class="flex items-center gap-1"><span class="lg-lic">лишение</span> штраф <b class="text-gray-300">или</b> лишение прав (на усмотрение ГИБДД)</span>
        <span class="flex items-center gap-1"><span class="lg-star">★</span> = 7 дней лишения свободы (срок отбывания)</span>
      </div>
    </div>
  </header>

  <div id="fitwrap">
    <main class="max-w-[1700px] mx-auto px-3 py-3 space-y-5" id="content"></main>
  </div>

  <p id="noresult" class="hidden text-center text-gray-500 py-12">Ничего не найдено 🔍</p>

  <footer class="border-t border-orange-500/10 py-4 px-4 mt-4" id="foot">
    <div class="max-w-[1700px] mx-auto text-center text-[11px] text-gray-600">
      Шпаргалка для РМРП Арбат · по материалам форума РМРП и памятки экспертов · справочный материал
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
